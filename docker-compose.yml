version: '3.8'

services:
  ic-shalom:
    build: .
    container_name: ic-shalom
    restart: unless-stopped
    ports:
      - "8080:80"
    labels:
      - "traefik.enable=true"
      # HTTP redirect to HTTPS
      - "traefik.http.routers.ic-shalom-http.rule=Host(`ic-shalom.com`) || Host(`ic-shalom.mx`) || Host(`ic-shalom.org`) || Host(`www.ic-shalom.com`) || Host(`www.ic-shalom.mx`) || Host(`www.ic-shalom.org`)"
      - "traefik.http.routers.ic-shalom-http.entrypoints=http"
      - "traefik.http.routers.ic-shalom-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      # HTTPS
      - "traefik.http.routers.ic-shalom.rule=Host(`ic-shalom.com`) || Host(`ic-shalom.mx`) || Host(`ic-shalom.org`) || Host(`www.ic-shalom.com`) || Host(`www.ic-shalom.mx`) || Host(`www.ic-shalom.org`)"
      - "traefik.http.routers.ic-shalom.entrypoints=https"
      - "traefik.http.routers.ic-shalom.tls=true"
      - "traefik.http.routers.ic-shalom.tls.certresolver=letsencrypt"
      - "traefik.http.services.ic-shalom.loadbalancer.server.port=8080"
