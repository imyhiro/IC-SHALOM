<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />

    <!-- SEO Meta Tags -->

    <meta name="description" content="Shalom Iglesia Cristiana - Una casa para todos. Iglesia cristiana en Cuernavaca, Morelos. Domingos 9:00, 11:00 y 13:00 hrs." />
    <meta name="keywords" content="iglesia cristiana, Shalom, Cuernavaca, Morelos, iglesia en Cuernavaca, culto dominical" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Shalom Iglesia Cristiana | Una casa para todos" />
    <meta property="og:description" content="Iglesia cristiana en Cuernavaca, Morelos. Domingos 9:00, 11:00 y 13:00 hrs." />
    <meta property="og:image" content="/logo.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Shalom Iglesia Cristiana | Una casa para todos" />
    <meta name="twitter:description" content="Iglesia cristiana en Cuernavaca, Morelos. Domingos 9:00, 11:00 y 13:00 hrs." />

    <!-- Theme Color -->
    <meta name="theme-color" content="#0a0a0a" />
  </head>
  <body>
    <!-- LIVE OVERRIDE: quitar este bloque cuando termine la transmisión -->
    <div id="live-override" style="position:fixed;top:0;left:0;width:100%;height:100vh;z-index:9999;background:#000;">
      <iframe
        src="https://www.youtube.com/embed/RiahYtCLuDg?autoplay=1"
        title="En Vivo - IC Shalom"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen
        style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;"
      ></iframe>
      <div style="position:absolute;top:1rem;left:50%;transform:translateX(-50%);z-index:10000;display:flex;align-items:center;gap:0.5rem;background:rgba(239,68,68,0.9);padding:0.4rem 1rem;border-radius:999px;">
        <span style="width:8px;height:8px;border-radius:50%;background:#fff;animation:pulse 1.5s infinite;"></span>
        <span style="color:#fff;font-size:0.8rem;font-weight:700;letter-spacing:0.1em;">EN VIVO</span>
      </div>
      <style>@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}</style>
      <button onclick="document.getElementById('live-override').style.display='none'" style="position:absolute;bottom:1rem;right:1rem;z-index:10000;background:rgba(0,0,0,0.7);color:#fff;border:1px solid rgba(255,255,255,0.3);padding:0.5rem 1rem;border-radius:999px;cursor:pointer;font-size:0.8rem;">Ver página</button>
    </div>
    <!-- FIN LIVE OVERRIDE -->
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
